<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>(se) comprendre</title>
  <meta name="description" content="Évalue ta confiance, relève tes défis, monte en confiance." />

  <!-- Open Graph -->
  <meta property="og:title" content="(se) comprendre" />
  <meta property="og:description" content="Évalue ta confiance, relève tes défis, monte en confiance." />
  <meta property="og:image" content="https://reseaux.secomprendre.fr/assets/logo.png" />
  <meta property="og:url" content="https://reseaux.secomprendre.fr" />
  <meta name="twitter:card" content="summary" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --violet: #7846C6;
      --violet-light: #9B6FD4;
      --lilas: #EDE7F6;
      --lavande: #D0A9E8;
      --gris: #4A3F55;
      --blanc-casse: #FAFAF8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #EDE7F6 0%, #F5F0FC 40%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      color: var(--gris);
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 48px rgba(120, 70, 198, 0.12);
      border: 1px solid rgba(208, 169, 232, 0.3);
      text-align: center;
    }

    .logo {
      width: 160px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--gris);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--violet);
      font-weight: 500;
      opacity: 0.8;
      margin-bottom: 32px;
      letter-spacing: 0.2px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--violet), var(--lavande));
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s ease;
      border: 1.5px solid transparent;
    }

    .link-btn:hover {
      transform: translateY(-2px);
    }

    .link-btn .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .link-btn .label {
      flex: 1;
      text-align: left;
    }

    .link-btn .arrow {
      font-size: 16px;
      opacity: 0.5;
    }

    /* Instagram */
    .btn-instagram {
      background: #FFF0F8;
      border-color: #F5C6E4;
      color: #8B1A5E;
    }
    .btn-instagram .icon { background: #FCE4F1; }
    .btn-instagram:hover { background: #FCE8F3; box-shadow: 0 4px 16px rgba(193, 53, 132, 0.15); }

    /* TikTok */
    .btn-tiktok {
      background: #F0F0F5;
      border-color: #DADAE8;
      color: #1A1A2E;
    }
    .btn-tiktok .icon { background: #E4E4EE; }
    .btn-tiktok:hover { background: #E8E8F0; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1); }

    /* Facebook */
    .btn-facebook {
      background: #EEF2FF;
      border-color: #C7D4F8;
      color: #1A3A7A;
    }
    .btn-facebook .icon { background: #DCE5FC; }
    .btn-facebook:hover { background: #E4ECFF; box-shadow: 0 4px 16px rgba(24, 82, 208, 0.12); }

    /* Web App */
    .btn-app {
      background: linear-gradient(135deg, var(--violet) 0%, #9B6FD4 100%);
      border-color: transparent;
      color: white;
      margin-top: 4px;
    }
    .btn-app .icon { background: rgba(255,255,255,0.2); }
    .btn-app .arrow { opacity: 0.8; }
    .btn-app:hover { box-shadow: 0 8px 24px rgba(120, 70, 198, 0.4); }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--violet);
      opacity: 0.4;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo.png" alt="(se) comprendre" class="logo" />

    <p class="tagline">Confiance en soi,<br>défis personnels.</p>
    <p class="subtitle">Le carnet qui t'aide à avancer à ton rythme</p>

    <div class="divider"></div>

    <div class="links">

      <!-- Instagram -->
      <a href="https://instagram.com/secomprendre" target="_blank" rel="noopener" class="link-btn btn-instagram">
        <span class="icon">📸</span>
        <span class="label">Instagram</span>
        <span class="arrow">→</span>
      </a>

      <!-- TikTok -->
      <a href="https://tiktok.com/@secomprendre" target="_blank" rel="noopener" class="link-btn btn-tiktok">
        <span class="icon">🎵</span>
        <span class="label">TikTok</span>
        <span class="arrow">→</span>
      </a>

      <!-- Facebook -->
      <a href="https://facebook.com/secomprendre" target="_blank" rel="noopener" class="link-btn btn-facebook">
        <span class="icon">💬</span>
        <span class="label">Facebook</span>
        <span class="arrow">→</span>
      </a>

      <!-- Web App -->
      <a href="https://app.secomprendre.fr" target="_blank" rel="noopener" class="link-btn btn-app">
        <span class="icon">🏔</span>
        <span class="label">Ouvrir la web app</span>
        <span class="arrow">→</span>
      </a>

    </div>

    <p class="footer">(se) comprendre &nbsp;·&nbsp; 2026</p>
  </div>
</body>
</html>
